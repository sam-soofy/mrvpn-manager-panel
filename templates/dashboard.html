<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRVPN Dashboard</title>
  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #111933;
      --panel2: #0e1628;
      --border: #1e2d50;
      --accent: #5b8cff;
      --accent2: #3d6eea;
      --green: #31c48d;
      --red: #ff5c5c;
      --yellow: #f6c343;
      --text: #e8eefc;
      --muted: #7a8db3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Layout ── */
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; color: var(--accent); letter-spacing: 0.5px; }
    header .right { display: flex; gap: 10px; align-items: center; }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 20px;
      display: grid;
      gap: 20px;
    }

    /* ── Cards ── */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Stats row ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .stat {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
    }
    .stat-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: 700; }
    .stat-unit  { font-size: 11px; color: var(--muted); margin-left: 2px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:hover  { opacity: 0.88; }
    .btn-primary  { background: var(--accent);  color: #fff; }
    .btn-danger   { background: var(--red);     color: #fff; }
    .btn-neutral  { background: #1e2d50;         color: var(--text); border: 1px solid var(--border); }
    .btn-ghost    { background: transparent;     color: var(--muted); border: 1px solid var(--border); }
    .btn-sm       { padding: 5px 11px; font-size: 12px; }
    .btn-icon     { padding: 6px 10px; }

    /* ── Actions row ── */
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }

    /* ── Chart ── */
    #chart { max-height: 180px; }

    /* ─────────────────────────────────────────
       Modal (shared for config editor + scheduler form)
    ───────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: min(700px, 100%);
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .modal-header {
      padding: 18px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h2 { font-size: 15px; }
    .modal-body   { padding: 20px 22px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 14px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── Config textarea ── */
    .code-area {
      width: 100%;
      min-height: 340px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Cascadia Code', 'Fira Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      padding: 14px;
      resize: vertical;
      outline: none;
    }
    .code-area:focus { border-color: var(--accent); }

    /* ── Form fields (scheduler) ── */
    .form-row { margin-bottom: 16px; }
    .form-label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.7px; }
    .form-input {
      width: 100%;
      padding: 9px 12px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .form-input:focus { border-color: var(--accent); }

    /* Days checkboxes */
    .days-grid {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .day-check { display: none; }
    .day-label {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      transition: all 0.15s;
      user-select: none;
    }
    .day-check:checked + .day-label {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Scheduler list ── */
    .schedule-list { display: flex; flex-direction: column; gap: 10px; }

    .schedule-item {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .schedule-time {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      min-width: 60px;
    }
    .schedule-info { flex: 1; }
    .schedule-name { font-weight: 600; margin-bottom: 4px; }
    .schedule-days { font-size: 11px; color: var(--muted); }
    .schedule-actions { display: flex; gap: 6px; }

    .empty-msg {
      text-align: center;
      color: var(--muted);
      padding: 32px 0;
      font-size: 13px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      z-index: 200;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #toast.success { border-left: 3px solid var(--green); }
    #toast.error   { border-left: 3px solid var(--red); }
    #toast.show    { display: block; }
  </style>
</head>
<body>

<header>
  <h1>⚡ MRVPN Dashboard</h1>
  <div class="right">
    <span id="hdr-status" style="color:var(--muted);font-size:12px;">Connecting…</span>
    <button class="btn btn-ghost btn-sm" onclick="logout()">Logout</button>
  </div>
</header>

<main>

  <!-- Stats -->
  <div class="card">
    <div class="card-title">System Health</div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-label">CPU</div>
        <div class="stat-value" id="s-cpu">—<span class="stat-unit">%</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">RAM</div>
        <div class="stat-value" id="s-ram">—<span class="stat-unit">%</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">Disk</div>
        <div class="stat-value" id="s-disk">—<span class="stat-unit">%</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">↓ RX</div>
        <div class="stat-value" id="s-rx">—<span class="stat-unit">MB/s</span></div>
      </div>
      <div class="stat">
        <div class="stat-label">↑ TX</div>
        <div class="stat-value" id="s-tx">—<span class="stat-unit">MB/s</span></div>
      </div>
    </div>
  </div>

  <!-- Chart -->
  <div class="card">
    <div class="card-title">CPU & RAM over time</div>
    <canvas id="chart"></canvas>
  </div>

  <!-- Actions -->
  <div class="card">
    <div class="card-title">VPN Control</div>
    <div class="actions">
      <button class="btn btn-danger" onclick="restartVPN()">⟳ Restart MasterDnsVPN</button>
      <button class="btn btn-neutral" onclick="openConfigEditor('server')">✎ Edit server_config.toml</button>
      <button class="btn btn-neutral" onclick="openConfigEditor('key')">🔑 Edit encrypt_key.txt</button>
    </div>
  </div>

  <!-- Scheduler -->
  <div class="card">
    <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;">
      <span>Config Scheduler</span>
      <button class="btn btn-primary btn-sm" onclick="openAddSchedule()">+ Add Schedule</button>
    </div>
    <div id="schedule-list" class="schedule-list">
      <div class="empty-msg">Loading…</div>
    </div>
  </div>

</main>

<!-- ═══════════════════════════════════════
     Modal: Config Editor
════════════════════════════════════════ -->
<div id="cfg-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="cfg-modal-title">Edit Config</h2>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('cfg-modal')">✕</button>
    </div>
    <div class="modal-body">
      <textarea id="cfg-textarea" class="code-area" spellcheck="false"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('cfg-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveConfig()">Save & Restart VPN</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════
     Modal: Add / Edit Schedule
════════════════════════════════════════ -->
<div id="sched-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="sched-modal-title">Add Schedule</h2>
      <button class="btn btn-ghost btn-icon" onclick="closeModal('sched-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="sched-id">

      <div class="form-row">
        <label class="form-label">Schedule Name</label>
        <input id="sched-name" class="form-input" placeholder="e.g. Night Aggressive Mode">
      </div>

      <div class="form-row">
        <label class="form-label">Apply at time (24h)</label>
        <input id="sched-time" class="form-input" type="time" value="22:00">
      </div>

      <div class="form-row">
        <label class="form-label">Days</label>
        <div class="days-grid">
          <input type="checkbox" class="day-check" id="d-mon" value="mon" checked><label class="day-label" for="d-mon">Mon</label>
          <input type="checkbox" class="day-check" id="d-tue" value="tue" checked><label class="day-label" for="d-tue">Tue</label>
          <input type="checkbox" class="day-check" id="d-wed" value="wed" checked><label class="day-label" for="d-wed">Wed</label>
          <input type="checkbox" class="day-check" id="d-thu" value="thu" checked><label class="day-label" for="d-thu">Thu</label>
          <input type="checkbox" class="day-check" id="d-fri" value="fri" checked><label class="day-label" for="d-fri">Fri</label>
          <input type="checkbox" class="day-check" id="d-sat" value="sat" checked><label class="day-label" for="d-sat">Sat</label>
          <input type="checkbox" class="day-check" id="d-sun" value="sun" checked><label class="day-label" for="d-sun">Sun</label>
        </div>
      </div>

      <div class="form-row">
        <label class="form-label" style="display:flex;justify-content:space-between;">
          <span>server_config.toml content</span>
          <button class="btn btn-ghost btn-sm" style="text-transform:none;font-size:11px;" onclick="loadCurrentConfigIntoSchedule()">Load current config</button>
        </label>
        <textarea id="sched-config" class="code-area" style="min-height:260px;" spellcheck="false" placeholder="Paste your TOML config here…"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('sched-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSchedule()">Save Schedule</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
