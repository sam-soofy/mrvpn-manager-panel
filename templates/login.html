<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MRVPN Login</title>
  <link rel="stylesheet" href="/static/css/login.css">
  <style>
    .site-footer {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px 16px;
      padding: 12px 20px;
      font-size: 12px;
      color: #555f6e;
      background: rgba(11, 14, 20, 0.85);
      backdrop-filter: blur(4px);
      border-top: 1px solid #1e2732;
    }
    .site-footer a {
      color: #555f6e;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s;
    }
    .site-footer a:hover { color: #39bae6; }
    .site-footer .footer-sep { color: #1e2732; user-select: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>MRVPN Panel</h1>
  <form id="loginForm">
    <input id="username" placeholder="Username" value="admin" required>
    <input id="password" type="password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <div id="error"></div>
</div>

<footer class="site-footer">
  <span>MRVPN Manager Panel</span>
  <span class="footer-sep">|</span>
  <a href="https://t.me/sami_lights" target="_blank" rel="noopener">
    📢 Channel&nbsp;<strong>@sami_lights</strong>
  </a>
  <span class="footer-sep">·</span>
  <a href="https://t.me/samsoofy" target="_blank" rel="noopener">
    💬 Contact&nbsp;<strong>@samsoofy</strong>
  </a>
</footer>

<script>
document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  const res = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      username: document.getElementById('username').value,
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  if (data.ok) {
    localStorage.setItem('access_token', data.access_token);
    localStorage.setItem('refresh_token', data.refresh_token);
    window.location.href = '/';
  } else {
    document.getElementById('error').textContent = data.error || 'Login failed';
  }
});
</script>
</body>
</html>
